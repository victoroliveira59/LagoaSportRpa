name: Executar Lagoa Sport RPA

on:
  schedule:
    # 08:00 UTC = 05:00 Horário de Brasília (Segunda-feira)
    - cron: '0 8 * * 1'
  
  workflow_dispatch:

jobs:
  run-rpa-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Build da Imagem Docker
        run: docker build -t rpa-image .

      - name: Rodar RPA
        # Agora tudo é puxado dos Secrets
        run: |
          docker run --rm \
          -e AGENDAMENTO__URLLOGIN="${{ secrets.AGENDAMENTO__URLLOGIN }}" \
          -e AGENDAMENTO__URLQUADRA="${{ secrets.AGENDAMENTO__URLQUADRA }}" \
          -e AGENDAMENTO__TEXTODIA="${{ secrets.AGENDAMENTO__TEXTODIA }}" \
          -e AGENDAMENTO__PARTICIPANTE__NOME="${{ secrets.AGENDAMENTO__PARTICIPANTE__NOME }}" \
          -e AGENDAMENTO__PARTICIPANTE__CPF="${{ secrets.AGENDAMENTO__PARTICIPANTE__CPF }}" \
          -e AGENDAMENTO__PARTICIPANTE__RG="${{ secrets.AGENDAMENTO__PARTICIPANTE__RG }}" \
          -e AGENDAMENTO__PARTICIPANTE__TELEFONE="${{ secrets.AGENDAMENTO__PARTICIPANTE__TELEFONE }}" \
          -e AGENDAMENTO__PARTICIPANTE__EMAIL="${{ secrets.AGENDAMENTO__PARTICIPANTE__EMAIL }}" \
          -e AGENDAMENTO__LOGINS__0__EMAIL="${{ secrets.AGENDAMENTO__LOGINS__0__EMAIL }}" \
          -e AGENDAMENTO__LOGINS__0__SENHA="${{ secrets.AGENDAMENTO__LOGINS__0__SENHA }}" \
          -e AGENDAMENTO__LOGINS__0__HORARIO="${{ secrets.AGENDAMENTO__LOGINS__0__HORARIO }}" \
          -e AGENDAMENTO__LOGINS__1__EMAIL="${{ secrets.AGENDAMENTO__LOGINS__1__EMAIL }}" \
          -e AGENDAMENTO__LOGINS__1__SENHA="${{ secrets.AGENDAMENTO__LOGINS__1__SENHA }}" \
          -e AGENDAMENTO__LOGINS__1__HORARIO="${{ secrets.AGENDAMENTO__LOGINS__1__HORARIO }}" \
          rpa-image

      - name: Upload dos Prints de Erro
        if: failure() # Só roda se o robô falhar
        uses: actions/upload-artifact@v4
        with:
          name: prints-de-erro
          path: prints/*.png
          retention-days: 5
